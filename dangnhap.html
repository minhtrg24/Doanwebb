<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - Trường Tech</title>

    <!-- Link FontAwesome để hiện icon -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <style>

        * {

    margin: 0; padding: 0; box-sizing: border-box;

    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

}



body {

    background: #f0f2f5;

    display: flex;

    justify-content: center;

    align-items: center;

    min-height: 100vh;

    padding: 20px;

}



.auth-container {

    background: white;

    width: 100%;

    max-width: 480px; /* Độ rộng lý tưởng */

    padding: 50px 40px;

    border-radius: 16px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.1);

    position: relative;

}



.logo {

    text-align: center;

    font-size: 2.2rem;

    font-weight: 800;

    margin-bottom: 30px;

}



.logo span { color: #cb1c22; }



.auth-tabs {

    display: flex;

    margin-bottom: 30px;

    border-bottom: 2px solid #eee;

}



.tab-btn {

    flex: 1;

    padding: 15px;

    border: none;

    background: none;

    cursor: pointer;

    font-size: 1.1rem;

    color: #888;

    font-weight: 600;

    transition: 0.3s;

}



.tab-btn.active {

    color: #cb1c22;

    border-bottom: 3px solid #cb1c22;

}



/* --- XỬ LÝ ẨN HIỆN FORM --- */

.auth-form {

    display: none;

    flex-direction: column;

    gap: 18px;

}



.auth-form.active {

    display: flex; 

    animation: fadeIn 0.4s ease;

}



@keyframes fadeIn {

    from { opacity: 0; transform: translateY(10px); }

    to { opacity: 1; transform: translateY(0); }

}



.input-box {

    position: relative;

    width: 100%;

}



.input-box i {

    position: absolute;

    left: 15px;

    top: 50%;

    transform: translateY(-50%);

    color: #aaa;

}



.input-box input {

    width: 100%;

    padding: 14px 15px 14px 45px;

    border: 1.5px solid #ddd;

    border-radius: 10px;

    outline: none;

    font-size: 1rem;

    transition: 0.3s;

}



.input-box input:focus {

    border-color: #cb1c22;

    box-shadow: 0 0 0 4px rgba(203, 28, 34, 0.1);

}



.form-options {

    display: flex;

    justify-content: space-between;

    font-size: 0.9rem;

    color: #555;

}



.form-options a {

    color: #cb1c22;

    text-decoration: none;

}



.btn-primary {

    background: #cb1c22;

    color: white;

    border: none;

    padding: 16px;

    border-radius: 10px;

    font-weight: bold;

    font-size: 1.1rem;

    cursor: pointer;

    transition: 0.3s;

    text-transform: uppercase;

}



.btn-primary:hover { background: #a8161b; transform: translateY(-2px); }



.social-login { text-align: center; margin-top: 30px; }

.social-icons { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }

.social-icons a {

    width: 45px; height: 45px; border-radius: 50%;

    display: flex; align-items: center; justify-content: center;

    color: white; text-decoration: none; font-size: 1.2rem;

}

.fb { background: #3b5998; }

.gg { background: #db4437; }



.back-home {

    position: absolute; top: 30px; left: 30px;

    text-decoration: none; color: #666; font-weight: 500;
    


}

@media (max-width: 600px) {
    .back-home {
        top: 10px; 
        left: 20px;
        z-index: 100; 
        font-size: 0.9rem; 
        background: rgba(255, 255, 255, 0.8); 
        padding: 5px 10px;
        border-radius: 20px;
    }
    
    body {
        align-items: flex-start; 
        padding-top: 60px; 
    }

    .auth-container {
        padding: 30px 20px; 
        margin-top: 20px;
    }
}

    </style>

</head>

<body>



    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Quay Lại Trang Chủ</a>



    <div class="auth-container">

        <div class="logo">TRƯỜNG <span>TECH</span></div>



        <div class="auth-tabs">

            <button class="tab-btn active" onclick="switchForm('login', this)">Đăng nhập</button>

            <button class="tab-btn" onclick="switchForm('register', this)">Đăng ký</button>

        </div>



        <!-- Form Đăng Nhập -->

        <form id="login-form" class="auth-form active">

            <div class="input-box">

                <i class="fas fa-envelope"></i>

                <input type="text" placeholder="Email hoặc Số điện thoại" required>

            </div>

            <div class="input-box">

                <i class="fas fa-lock"></i>

                <input type="password" placeholder="Mật khẩu" required>

            </div>

            <div class="form-options">

                <label><input type="checkbox"> Ghi nhớ</label>

                <a href="#">Quên mật khẩu?</a>

            </div>

            <button type="submit" class="btn-primary">ĐĂNG NHẬP</button>

        </form>



        <!-- Form Đăng Ký (Mặc định ẩn) -->

        <form id="register-form" class="auth-form">

            <div class="input-box">

                <i class="fas fa-user"></i>

                <input type="text" placeholder="Họ và tên" required>

            </div>

            <div class="input-box">

                <i class="fas fa-envelope"></i>

                <input type="email" placeholder="Email của bạn" required>

            </div>

            <div class="input-box">

                <i class="fas fa-lock"></i>

                <input type="password" placeholder="Mật khẩu mới" id="mkmoi" required>

            </div>

            <div class="input-box">

                <i class="fas fa-lock"></i>

                <input type="password" placeholder="Xác Nhận Mật khẩu " id="xacnhanmk" required>

            </div>

            <button type="submit" class="btn-primary">TẠO TÀI KHOẢN</button>

        </form>



        <div class="social-login">

            <p>Hoặc đăng nhập với</p>

            <div class="social-icons">

                <a href="#" class="fb"><i class="fab fa-facebook-f"></i></a>

                <a href="#" class="gg"><i class="fab fa-google"></i></a>

            </div>

        </div>

    </div>



    <!-- JavaScript đặt ngay trước thẻ đóng body -->

    <script src="script.js"></script>

</body>

</html>
